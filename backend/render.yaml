services:
  - type: web
    name: lumina-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0:$PORT --workers 2"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: FLASK_ENV
        value: production
